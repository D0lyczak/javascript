<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Łyczak Z39_JS</title>
</head>
<body>

<input type="button" value="Oblicz" onclick="fun_lyc()">

<script>
function fun_lyc(){
var x_lyc = prompt("Podaj kolor","");
var txt = x_lyc.toLowerCase();

if(x_lyc==1 || txt=="czerwony"){
document.write('<h1 style="color:red;">wczytałeś kolor czerwony</h1>');
}
else if(x_lyc==2 || txt=="niebieski"){
document.write('<h6 style="color:blue;">wczytałeś kolor niebieski</h6>');
}
}
</script>

</body>
</html>
